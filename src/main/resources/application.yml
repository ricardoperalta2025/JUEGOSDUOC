
server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: juegos-service
  profiles:
    active: prod

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/